version: "3.9"

services:

  db:
    image: mysql:8
    container_name: sakila-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - sakila-db-data:/var/lib/mysql
    networks:
      - sakila-network
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sakila-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
    networks:
      - sakila-network
    restart: on-failure:5

  db-admin:
    image: adminer:latest
    container_name: sakila-adminer
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - sakila-network

  test-runner:
    build: .
    profiles:
      - test
    command: python -m pytest tests/ -v
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sakila-network

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data:
