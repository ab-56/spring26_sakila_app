name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app

jobs:

# ─────────────────────────────
# LINT JOB
# ─────────────────────────────
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run lint
        run: |
          flake8 . \
          --max-line-length=120 \
          --ignore=E501,W503


# ─────────────────────────────
# TEST JOB (FIXED MYSQL)
# ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_USER: root
      MYSQL_PASSWORD: admin
      MYSQL_DB: sakila
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest pymysql

      - name: Run tests
        run: PYTHONPATH=$PWD pytest -v


# ─────────────────────────────
# BUILD JOB
# ─────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Verify Image
        run: docker images

      - name: Smoke Test
        run: |
          docker run -d -p 5000:5000 --name test-container $IMAGE_NAME:${{ github.sha }}
          sleep 10
          curl --fail http://localhost:5000 || exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f test-container || true


# ─────────────────────────────
# SECURITY SCAN
# ─────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Image Again
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          output: trivy-report.txt
          exit-code: 0

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt