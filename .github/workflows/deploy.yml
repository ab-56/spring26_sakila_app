
name: Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "config.py"
      - "templates/**"
      - "static/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.yml"

jobs:

  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set staging environment variables
        run: |
          echo "ENV=staging"
          echo "DB_HOST=staging-db"
          echo "DB_USER=admin"

      - name: Run staging Docker container
        run: |
          docker build -t sakila-app:staging .
          docker run -d --name staging-container sakila-app:staging
          echo "Staging deployment running..."

      - name: Slack Notification (Simulated)
        run: echo "Slack notification: Deployment to STAGING successful"

      - name: GitHub Step Summary
        run: |
          echo "## 🚀 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: Staging" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create production Docker image
        run: |
          docker build -t sakila-app:production .

      - name: Run production container
        run: |
          docker run -d --name prod-container sakila-app:production
          echo "Production deployment running..."

      - name: Slack Notification (Simulated)
        run: echo "Slack notification: Deployment to PRODUCTION successful"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Production Release v${{ github.run_number }}
          draft: false
          prerelease: false