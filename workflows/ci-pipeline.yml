nname: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run lint
        run: flake8 . --max-line-length=120 --ignore=E501,W503,E302,E128,W291,W293,F401,W292


  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pymysql

      - name: Wait for MySQL
        run: sleep 20

      - name: Run tests
        env:
          MYSQL_HOST: localhost
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DB: sakila
        run: pytest -v


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Verify Image
        run: docker images

      - name: Smoke Test
        run: |
          docker run -d -p 5000:5000 --name test-container $IMAGE_NAME:${{ github.sha }}
          sleep 10
          curl http://localhost:5000 || exit 1


  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Build Image Again
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          output: trivy-report.txt
          exit-code: 0

      - name: Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: trivy-report
          path: trivy-report.txt